<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThumbGrabber V2 - Steal the Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --panel:#080808;
    --border:#1d1d1d;
    --red:#ff2d2d;
    --text:#f4f4f4;
    --muted:#777;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height: 100vh;
  }

  .container{
    width:min(1200px,90%);
    margin:auto;
    padding:60px 0;
  }

  .badge{
    display:inline-flex;
    gap:12px;
    align-items:center;
    color:#9a9a9a;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:25px;
    font-size: 0.9rem;
  }

  .badge::before{
    content:"";
    width:34px;
    height:34px;
    background:var(--red);
    display:block;
  }

  .hero{
    display:flex;
    justify-content:space-between;
    gap:60px;
  }

  .hero-left{
    flex:1;
  }

  .hero h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(60px,8vw,120px);
    line-height:.9;
    letter-spacing:2px;
    font-weight:400;
  }

  .red{ color:var(--red); }
  .gray{ color:#666670; }

  .desc{
    margin-top:35px;
    color:#9c9c9c;
    max-width:700px;
    line-height:1.8;
    font-size:1.15rem;
  }

  .status{
    min-width:250px;
    border-left:1px solid var(--border);
    padding-left:40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .status-title{
    color:#777;
    letter-spacing:5px;
    font-size:.8rem;
  }

  .online{
    margin-top:15px;
    font-family:'Bebas Neue',sans-serif;
    font-size:3rem;
  }

  .green{ color:#00d084; }

  .mini{
    margin-top:10px;
    color:#555;
    font-size:.75rem;
    letter-spacing:2px;
  }

  .panel{
    margin-top:70px;
    border:1px solid var(--border);
    background: var(--panel);
    display:grid;
    grid-template-columns:2fr 1fr;
  }

  .box{
    padding:40px;
  }
  
  .box.left-box {
    border-right:1px solid var(--border);
  }

  .box-title{
    color:#8a8a8a;
    font-size:.8rem;
    letter-spacing:2px;
    margin-bottom:20px;
  }

  textarea{
    width:100%;
    min-height:200px;
    background:#000;
    border:1px solid var(--border);
    color:#fff;
    padding:20px;
    font-size: 1.1rem;
    font-family:'Inter',sans-serif;
    resize:none;
    outline: none;
    transition: border-color 0.3s;
  }

  textarea:focus {
    border-color: #444;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .card{
    background: #0a0a0a;
    border:1px solid var(--border);
    padding:22px;
    cursor:pointer;
    transition:.2s;
  }

  .card:hover {
    border-color: #444;
  }

  .card.active{
    background:var(--red);
    border-color: var(--red);
  }

  .card.active .mini {
    color: #fff;
    opacity: 0.8;
  }

  .card h3{
    font-family:'Bebas Neue',sans-serif;
    font-size:1.8rem;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .generate{
    width:100%;
    margin-top:20px;
    background:var(--red);
    border:none;
    color:#fff;
    padding:20px;
    cursor:pointer;
    font-weight:600;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    letter-spacing:3px;
    transition: background 0.2s, transform 0.1s;
  }

  .generate:hover {
    background: #e61919;
  }
  .generate:active {
    transform: scale(0.98);
  }

  .results{
    margin-top:40px;
    border:1px solid var(--border);
    background: var(--panel);
    min-height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#555;
    text-align:center;
    letter-spacing: 2px;
    font-size: 0.9rem;
    padding: 20px;
  }

  /* Result styling generated by JS */
  .result-container {
    width: 100%;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
    text-align: left;
    letter-spacing: normal;
  }

  .result-img-wrapper img {
    width: 100%;
    height: auto;
    border: 1px solid var(--border);
    display: block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .result-meta {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .result-author {
    color: var(--red);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 2px;
    margin-bottom: 5px;
  }

  .result-title {
    font-size: 1.3rem;
    color: var(--text);
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 30px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid #444;
    color: var(--text);
    padding: 15px 30px;
    cursor: pointer;
    transition: .2s;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 1.2rem;
    width: 100%;
    text-align: center;
    display: inline-block;
    text-decoration: none;
  }

  .btn-outline:hover {
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }

  /* Responsive Design */
  @media (max-width: 900px) {
    .hero { flex-direction: column; gap: 40px; }
    .status { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 30px; }
    .panel { grid-template-columns: 1fr; }
    .box.left-box { border-right: none; border-bottom: 1px solid var(--border); }
    .result-container { grid-template-columns: 1fr; gap: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="hero">
    <div class="hero-left">
      <div class="badge">THUMBGRABBER / V2</div>
      <h1>
        STEAL THE<br>
        <span class="red">FRAME.</span>
        <span class="gray">NOT THE</span><br>
        <span class="gray">CREDIT.</span>
      </h1>
      <p class="desc">
        Paste any YouTube link. We pull the original
        thumbnail, the title and the channel instantly.
      </p>
    </div>

    <div class="status">
      <div class="status-title">STATUS</div>
      <div class="online">
        <span class="green">■</span> ONLINE
      </div>
      <div class="mini">NO API KEY • NO LIMIT • NO LOGIN</div>
    </div>
  </div>

  <div class="panel">
    <div class="box left-box">
      <div class="box-title">INPUT TARGET</div>
      <textarea id="yt-link" placeholder="Paste YouTube video URL here...&#10;e.g. https://www.youtube.com/watch?v=dQw4w9WgXcQ"></textarea>
    </div>
    
    <div class="box">
      <div class="box-title">QUALITY SELECT</div>
      <div class="grid">
        <div class="card active" data-quality="maxresdefault">
          <h3>MAX</h3>
          <div class="mini">1280 x 720</div>
        </div>
        <div class="card" data-quality="hqdefault">
          <h3>HIGH</h3>
          <div class="mini">480 x 360</div>
        </div>
      </div>
      <button class="generate" id="grab-btn">EXTRACT ASSETS</button>
    </div>
  </div>

  <div class="results" id="results-area">
    AWAITING TARGET URL...
  </div>

</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const linkInput = document.getElementById('yt-link');
    const grabBtn = document.getElementById('grab-btn');
    const resultsArea = document.getElementById('results-area');
    const cards = document.querySelectorAll('.card');
    let selectedQuality = 'maxresdefault';

    // Quality Selection Logic
    cards.forEach(card => {
      card.addEventListener('click', () => {
        cards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        selectedQuality = card.dataset.quality;
      });
    });

    // Extract Video ID from various YouTube URL formats
    function extractVideoID(url) {
      const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
      const match = url.match(regex);
      return match ? match[1] : null;
    }

    // Grab Logic
    grabBtn.addEventListener('click', async () => {
      const url = linkInput.value.trim();
      const videoId = extractVideoID(url);

      if (!videoId) {
        resultsArea.innerHTML = '<div style="color: var(--red);">ERROR: INVALID OR MISSING YOUTUBE LINK.</div>';
        return;
      }

      resultsArea.innerHTML = '<div class="blink">ESTABLISHING CONNECTION...</div>';

      try {
        // Fetch metadata via NoEmbed (Bypasses CORS, no API key needed)
        const noembedUrl = `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`;
        const response = await fetch(noembedUrl);
        const data = await response.json();

        const title = data.title || "Metadata Unavailable";
        const author = data.author_name || "Unknown Source";
        
        // Construct Thumbnail URL
        const thumbUrl = `https://img.youtube.com/vi/${videoId}/${selectedQuality}.jpg`;
        const fallbackThumbUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

        // Render Results
        resultsArea.innerHTML = `
          <div class="result-container">
            <div class="result-img-wrapper">
              <img src="${thumbUrl}" alt="Extracted Thumbnail" id="grabbed-thumb" onerror="this.onerror=null; this.src='${fallbackThumbUrl}';">
            </div>
            <div class="result-meta">
              <div>
                <div class="result-author">${author}</div>
                <div class="result-title">${title}</div>
              </div>
              <div class="action-buttons">
                <a href="${thumbUrl}" target="_blank" class="btn-outline">OPEN IMAGE</a>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        // Fallback if metadata API fails (just show the image)
        const thumbUrl = `https://img.youtube.com/vi/${videoId}/${selectedQuality}.jpg`;
        resultsArea.innerHTML = `
          <div class="result-container">
            <div class="result-img-wrapper">
              <img src="${thumbUrl}" alt="Extracted Thumbnail" onerror="this.onerror=null; this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg';">
            </div>
            <div class="result-meta">
              <div class="result-title" style="color: var(--muted);">Metadata could not be fetched, but thumbnail was generated.</div>
              <div class="action-buttons">
                <a href="${thumbUrl}" target="_blank" class="btn-outline">OPEN IMAGE</a>
              </div>
            </div>
          </div>
        `;
      }
    });
  });
</script>
</body>
</html>
