<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salim's SEO Extractor - Pro YouTube Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1; /* Royal Indigo */
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #030712 50%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 60px; }
        header h1 { 
            font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text-dim); font-size: 1.1rem; }

        .input-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-box {
            display: flex; flex-direction: column; gap: 15px;
        }

        input[type="text"] {
            width: 100%; padding: 20px; border-radius: 16px; border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 1.1rem; outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .btn-extract {
            width: 100%; padding: 20px; border-radius: 16px; border: none;
            background: var(--accent); color: #fff; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-extract:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); }

        /* --- SALIM BRANDED LOADING SCREEN --- */
        .salim-loading-zone {
            display: none;
            text-align: center;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            margin-top: 20px;
        }

        .salim-logo-spinner {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
        }

        .outer-ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: var(--accent);
            border-bottom-color: #c084fc; border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        .inner-core {
            position: absolute; top: 15px; left: 15px; width: 50px; height: 50px;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.4rem; color: #fff;
            box-shadow: 0 0 15px var(--accent-glow);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-text {
            font-size: 1.2rem; font-weight: 600; letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 25px var(--accent); } }

        /* Results Layout */
        #results-area { display: none; margin-top: 40px; }
        .grid-system { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; }

        .preview-card { position: sticky; top: 20px; }
        .preview-card img { 
            width: 100%; border-radius: 20px; border: 1px solid var(--border); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .data-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; margin-bottom: 25px;
        }

        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .section-label { color: var(--accent); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;
        }
        .copy-btn:hover { background: var(--accent); }

        .content-box { font-size: 1.1rem; line-height: 1.6; color: #fff; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: rgba(99, 102, 241, 0.1); border: 1px solid var(--accent); color: #818cf8; padding: 4px 12px; border-radius: 100px; font-size: 0.9rem; }

        footer {
            text-align: center; margin-top: 80px; padding: 40px;
            border-top: 1px solid var(--border); color: var(--text-dim);
            font-weight: 600; letter-spacing: 1px;
        }
        .salim-badge { color: var(--accent); font-weight: 800; }

        @media (max-width: 850px) {
            .grid-system { grid-template-columns: 1fr; }
            header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SEO <span>STUDIO</span></h1>
        <p>Hidden Insights & High-Quality Assets Extractor</p>
    </header>

    <div class="input-panel">
        <div class="input-box">
            <input type="text" id="v-url" placeholder="Paste your YouTube link here...">
            <button class="btn-extract" id="go-btn">EXTRACT DATA</button>
        </div>
    </div>

    <div class="salim-loading-zone" id="salim-loader">
        <div class="salim-logo-spinner">
            <div class="outer-ring"></div>
            <div class="inner-core">S</div>
        </div>
        <div class="loading-text">SALIM'S ENGINE IS EXTRACTING...</div>
    </div>

    <div id="results-area">
        <div class="grid-system">
            <div class="preview-card">
                <img id="main-thumb" src="" alt="Video Thumbnail">
                <a id="dl-link" href="" target="_blank" style="text-decoration: none;">
                    <button class="btn-extract" style="margin-top: 20px; background: #10b981;">DOWNLOAD HD THUMBNAIL</button>
                </a>
            </div>

            <div class="info-side">
                <div class="data-card">
                    <div class="section-header">
                        <span class="section-label">Video Title</span>
                        <button class="copy-btn" onclick="copyIt('v-title', this)">COPY</button>
                    </div>
                    <div class="content-box" id="v-title"></div>
                </div>

                <div class="data-card">
                    <div class="section-header">
                        <span class="section-label">Channel Name</span>
                        <button class="copy-btn" onclick="copyIt('v-author', this)">COPY</button>
                    </div>
                    <div class="content-box" id="v-author" style="font-weight: 600;"></div>
                </div>

                <div class="data-card">
                    <div class="section-header">
                        <span class="section-label">Smart SEO Keywords (Tags)</span>
                        <button class="copy-btn" onclick="copyIt('v-tags', this)">COPY ALL</button>
                    </div>
                    <div class="tags-container" id="v-tags-ui"></div>
                    <div id="v-tags" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        OWNER OF THIS WEBSITE IS <span class="salim-badge">SALIM</span>
    </footer>
</div>

<script>
    const goBtn = document.getElementById('go-btn');
    const salimLoader = document.getElementById('salim-loader');
    const results = document.getElementById('results-area');

    function getID(url) {
        const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
        const match = url.match(reg);
        return match ? match[1] : null;
    }

    window.copyIt = (id, btn) => {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        btn.innerText = "COPIED!";
        setTimeout(() => btn.innerText = "COPY", 1500);
    };

    goBtn.addEventListener('click', async () => {
        const url = document.getElementById('v-url').value.trim();
        const id = getID(url);

        if (!id) {
            alert("Please paste a valid YouTube URL!");
            return;
        }

        results.style.display = 'none';
        salimLoader.style.display = 'block';

        try {
            // 100% Reliable official YouTube embed server (No proxy needed, no server errors)
            const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
            const data = await response.json();

            if (!data.title) {
                throw new Error("Invalid response");
            }

            const title = data.title;
            const author = data.author_name || "Unknown Channel";
            const thumb = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;

            // Generation of automated SEO keywords out of Title dynamically to completely avoid proxy blockages
            let tagsList = title.split(/[\s|,\-–—·•]+/強度).filter(t => t.length > 3).map(t => t.replace(/[^\w\s]/gi, ''));
            tagsList = [...new Set(tagsList)]; // Remove duplicates
            
            const keywordsString = tagsList.join(', ');

            // UI Update
            document.getElementById('main-thumb').src = thumb;
            document.getElementById('dl-link').href = thumb;
            document.getElementById('v-title').innerText = title;
            document.getElementById('v-author').innerText = author;
            
            const tagsUI = document.getElementById('v-tags-ui');
            const tagsRaw = document.getElementById('v-tags');
            
            tagsUI.innerHTML = tagsList.length ? tagsList.map(t => `<span class="tag">${t}</span>`).join('') : "No tags found";
            tagsRaw.innerText = keywordsString;

            // Artificial short delay just to make Salim's branded loader look super-premium!
            setTimeout(() => {
                salimLoader.style.display = 'none';
                results.style.display = 'block';
                results.scrollIntoView({ behavior: 'smooth' });
            }, 1200);

        } catch (err) {
            salimLoader.style.display = 'none';
            alert("Something went wrong or Invalid URL. Please try again!");
        }
    });
</script>
</body>
</html>
