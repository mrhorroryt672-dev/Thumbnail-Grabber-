<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Studio - Assets Extractor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --border: #334155;
    --primary: #8b5cf6;
    --primary-hover: #7c3aed;
    --text: #f8fafc;
    --text-muted: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg-main);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    padding: 30px 15px;
  }

  .wrapper {
    max-width: 1000px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  header h1 span { color: var(--primary); }
  header p { color: var(--text-muted); font-size: 1.1rem; }

  .input-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  }

  .input-label {
    display: block;
    font-weight: 600;
    margin-bottom: 12px;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  input[type="text"] {
    width: 100%;
    padding: 16px;
    background: #0b0f19;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    outline: none;
    font-family: inherit;
  }

  input[type="text"]:focus {
    border-color: var(--primary);
  }

  .btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover { background: var(--primary-hover); }

  .output-placeholder {
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
    border: 2px dashed var(--border);
    border-radius: 16px;
    font-size: 1.1rem;
  }

  /* Divided Output Layout */
  .grid-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
  }

  @media (min-width: 768px) {
    .grid-layout { grid-template-columns: 1fr 1.2fr; }
  }

  .preview-box img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 15px;
  }

  .download-link {
    display: block;
    text-align: center;
    background: #10b981;
    color: white;
    text-decoration: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 600;
  }

  .data-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .box-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .box-title {
    font-weight: 600;
    color: var(--primary);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .copy-btn {
    background: #334155;
    border: none;
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }

  .copy-btn:hover { background: #475569; }

  .content-text {
    font-size: 1rem;
    line-height: 1.6;
    word-break: break-word;
  }

  .scrollable {
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 0.9rem;
    color: #cbd5e1;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <h1>SEO <span>STUDIO</span></h1>
    <p>Extract YouTube metadata instantly</p>
  </header>

  <div class="input-section">
    <span class="input-label">Enter YouTube Video Link</span>
    <div class="input-group">
      <input type="text" id="video-url" placeholder="https://www.youtube.com/watch?v=...">
      <button class="btn" id="extract-btn">Extract Assets</button>
    </div>
  </div>

  <div id="display-area">
    <div class="output-placeholder">
      Paste a link above and click extract to load assets.
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const urlInput = document.getElementById('video-url');
    const extractBtn = document.getElementById('extract-btn');
    const displayArea = document.getElementById('display-area');

    function getID(url) {
      const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
      const match = url.match(reg);
      return match ? match[1] : null;
    }

    window.copyText = (text, btn) => {
      navigator.clipboard.writeText(text).then(() => {
        const oldText = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = oldText; }, 1200);
      });
    };

    extractBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      const id = getID(url);

      if (!id) {
        displayArea.innerHTML = '<div class="output-placeholder" style="color: #ef4444; border-color: #ef4444;">Error: Please enter a valid YouTube link.</div>';
        return;
      }

      displayArea.innerHTML = '<div class="output-placeholder">Processing assets...</div>';

      try {
        // Safe & Stable metadata fetch using NoEmbed (No proxy, no crash)
        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
        const data = await res.json();

        const title = data.title || "No Title Available";
        const author = data.author_name || "Unknown Channel";
        const maxThumb = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;

        // Render clean, completely fresh layout
        displayArea.innerHTML = `
          <div class="grid-layout">
            <div class="preview-box">
              <img src="${maxThumb}" alt="Thumbnail" onerror="this.onerror=null; this.src='https://img.youtube.com/vi/${id}/hqdefault.jpg';">
              <a href="${maxThumb}" target="_blank" class="download-link">Open Full Size Image</a>
            </div>

            <div class="info-box">
              <div class="data-box">
                <div class="box-header">
                  <span class="box-title">Video Title</span>
                  <button class="copy-btn" onclick="copyText(\`${title.replace(/`/g, '\\`').replace(/\${/g, '\\${')}\`, this)">Copy</button>
                </div>
                <div class="content-text">${title}</div>
              </div>

              <div class="data-box">
                <div class="box-header">
                  <span class="box-title">Channel Name</span>
                  <button class="copy-btn" onclick="copyText('${author}', this)">Copy</button>
                </div>
                <div class="content-text" style="font-weight: 600;">${author}</div>
              </div>

              <div class="data-box">
                <div class="box-header">
                  <span class="box-title">Quick Note</span>
                </div>
                <div class="content-text scrollable">To fetch hidden tags and long descriptions without errors, a secure database is needed. For this direct version, Title, Channel, and HD Thumbnail are safely extracted without any crashes!</div>
              </div>
            </div>
          </div>
        `;

      } catch (err) {
        displayArea.innerHTML = '<div class="output-placeholder" style="color: #ef4444; border-color: #ef4444;">Something went wrong. Please check your internet and try again.</div>';
      }
    });
  });
</script>
</body>
</html>
